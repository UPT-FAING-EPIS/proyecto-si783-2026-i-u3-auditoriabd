name: Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  all_tests:
    name: Ejecutar Pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalamos las librerías necesarias para todos los tipos de pruebas
          pip install pytest pytest-cov mutmut pytest-playwright behave
          playwright install --with-deps

      - name: Pruebas Unitarias
        run: |
          echo "Ejecutando pruebas unitarias..."
          if [ -d "tests/unit" ]; then
            PYTHONPATH=. pytest tests/unit/ --cov=app
          else
            echo "No se encontró el directorio tests/unit. Asegúrate de crear tus pruebas unitarias ahí."
          fi

      - name: Pruebas de Integración
        run: |
          echo "Ejecutando pruebas de integración..."
          if [ -d "tests/integration" ]; then
            PYTHONPATH=. pytest tests/integration/
          else
            echo "No se encontró el directorio tests/integration. Asegúrate de crear tus pruebas de integración ahí."
          fi

      - name: Pruebas de Mutantes (Mutmut)
        run: |
          echo "Ejecutando pruebas de mutantes..."
          if [ -d "tests" ]; then
            # Se ejecuta mutmut limitando a app.py para que no tome demasiado tiempo.
            # Se usa || true para que el workflow no falle si hay mutantes sobrevivientes.
            mutmut run --paths-to-mutate app.py || true
          else
             echo "No se encontró el directorio tests para correr mutmut."
          fi

      - name: Pruebas de Interfaz (Playwright)
        run: |
          echo "Ejecutando pruebas de interfaz..."
          if [ -d "tests/interface" ]; then
            PYTHONPATH=. pytest tests/interface/
          else
            echo "No se encontró el directorio tests/interface. Asegúrate de crear tus pruebas de interfaz ahí usando Playwright."
          fi

      - name: Pruebas BDD (Behave)
        run: |
          echo "Ejecutando pruebas BDD..."
          if [ -d "features" ]; then
            PYTHONPATH=. behave
          else
            echo "No se encontró el directorio features. Asegúrate de crear tus pruebas BDD (archivos .feature) ahí."
          fi
