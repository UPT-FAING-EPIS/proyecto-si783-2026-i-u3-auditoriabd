openapi: 3.0.3
info:
  title: DB Audit & Monitoring Skill API
  version: 1.0.0
  description: API REST para administrar, auditar, monitorear y generar scripts de reversión para bases de datos relacionales y no relacionales.
servers:
  - url: http://localhost:8000
    description: Servidor Local
tags:
  - name: Health
    description: Estado del servicio
  - name: Connections
    description: Gestión de conexiones e inyección de auditoría
  - name: Logs
    description: Consulta de registros de auditoría
  - name: Rollback
    description: Generación de scripts de reversión
paths:
  /health:
    get:
      tags: [Health]
      summary: Estado del servicio de auditoría
      responses:
        "200":
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/connections:
    post:
      tags: [Connections]
      summary: Conecta una BD e inyecta la lógica de auditoría
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionRequest"
      responses:
        "200":
          description: Conexión establecida y auditoría inyectada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/logs:
    get:
      tags: [Logs]
      summary: Obtiene logs de auditoría filtrados
      parameters:
        - in: query
          name: engine
          schema:
            $ref: "#/components/schemas/Engine"
          description: Motor de base de datos
        - in: query
          name: operation
          schema:
            type: string
            enum: [INSERT, UPDATE, DELETE]
          description: Tipo de operación a filtrar
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Número máximo de registros a retornar
      responses:
        "200":
          description: Lista de logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/rollback:
    post:
      tags: [Rollback]
      summary: Genera un script de reversión a partir de un log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "200":
          description: Script de reversión generado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Log no encontrado
  /api/v1/metrics:
    get:
      tags: [Logs]
      summary: Obtiene estadísticas globales de operaciones
      responses:
        "200":
          description: Estadísticas y conteos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
components:
  responses:
    BadRequest:
      description: Solicitud inválida o credenciales incorrectas
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Engine:
      type: string
      enum: [postgresql, mysql, sqlite, mongodb]
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: db-audit-skill
        version:
          type: string
          example: 1.0.0
    ConnectionRequest:
      type: object
      required: [engine, connection]
      properties:
        engine:
          $ref: "#/components/schemas/Engine"
        connection:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer
            user:
              type: string
            password:
              type: string
            database:
              type: string
    ConnectionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Conexión exitosa y triggers creados correctamente."
    LogEntry:
      type: object
      properties:
        id:
          type: string
          example: "log_1001"
        timestamp:
          type: string
          format: date-time
        engine:
          $ref: "#/components/schemas/Engine"
        table:
          type: string
        operation:
          type: string
          enum: [INSERT, UPDATE, DELETE]
        old_data:
          type: object
          nullable: true
        new_data:
          type: object
          nullable: true
        user:
          type: string
    LogsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
    RollbackRequest:
      type: object
      required: [log_id]
      properties:
        log_id:
          type: string
          example: "log_1001"
    RollbackResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        rollback_script:
          type: string
          example: "INSERT INTO empleados (id, nombre) VALUES (1, 'Juan');"
    MetricsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        total_operations:
          type: integer
          example: 1542
        operations_by_engine:
          type: object
          properties:
            postgresql:
              type: integer
            mysql:
              type: integer
            sqlite:
              type: integer
            mongodb:
              type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
